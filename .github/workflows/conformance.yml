# Conformance harness job.
#
# Runs the black-box suite under `conformance/` against the published OSS
# ingest server image (`ghcr.io/peaktek/resolvetrace-core:sha-<shortsha>`,
# produced by the `resolvetrace-core` repository). The job is a first-class
# gate: any conformance regression blocks the PR.
#
# Container layout:
#   - `postgres`, `minio`, and `ingest` are all started via `docker run -d`
#     in setup steps and joined to a user-defined docker network
#     (`rt-conformance`) created at the top of the job. We do NOT use
#     GitHub Actions `services:` for ingest: a `services:` pull failure
#     terminates the job before any user step runs, leaving no in-band
#     place to retry the GHCR pull. Pulling explicitly with retry-and-
#     backoff makes transient GHCR 5xx and timeouts recoverable.
#   - Postgres comes up first: ingest runs schema migrations at boot when
#     DATABASE_URL is set and exits if it can't reach the database, so it
#     must connect successfully before the HTTP listener binds.
#   - MinIO has always been a manual `docker run` step because the
#     official `minio/minio` image needs the `server /data` command at
#     launch and GitHub Actions `services:` has no `command` field.
#     (bitnami/minio — the usual workaround that bakes `server /data` into
#     the entrypoint — was moved to a restricted Broadcom registry in
#     Aug 2025; see velero-io/velero#9279.)
#   - The shared user network gives the containers stable hostnames
#     (`postgres`, `minio`, `ingest`) for in-network traffic. Host port
#     mappings keep the runner's `http://localhost:4317` and
#     `http://localhost:9000` access paths identical to the previous
#     services-based setup.
#
# The weekly `schedule:` trigger re-runs the full harness against whatever
# image tags are pinned today, so an upstream tag removal (as happened with
# `bitnami/minio` in Aug 2025 and `tufin/oasdiff:v1.11.6` earlier) surfaces
# within 7 days rather than waiting for the next push to contract.
name: conformance

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: conformance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conformance:
    name: black-box conformance
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create shared docker network
        # Ingest, MinIO, and Postgres all join this network so they can
        # reach each other by name (ingest -> minio:9000, ingest ->
        # postgres:5432). Replaces the previous `github_network_*`
        # auto-discovery, which only existed when the job declared GHA
        # `services:` entries.
        run: docker network create rt-conformance

      - name: Start Postgres on the shared network
        # Ingest's Postgres-backed event/session sinks run schema migrations
        # at boot when DATABASE_URL is set; if Postgres is unreachable the
        # process exits before binding the HTTP listener. The official
        # `postgres` image starts in <5s with the default config, fast
        # enough to keep the readiness wait below short.
        run: |
          docker run -d \
            --name postgres \
            --network rt-conformance \
            --network-alias postgres \
            -e POSTGRES_USER=conformance \
            -e POSTGRES_PASSWORD=conformance \
            -e POSTGRES_DB=conformance \
            postgres:16-alpine

      - name: Wait for Postgres readiness
        run: |
          for i in $(seq 1 30); do
            if docker exec postgres pg_isready -U conformance -d conformance >/dev/null 2>&1; then
              echo "Postgres is ready."
              exit 0
            fi
            sleep 2
          done
          echo "::error::Postgres did not become ready within 60s."
          docker logs postgres || true
          exit 1

      - name: Pull ingest image (with retry)
        # Pinned to a commit-SHA tag (sha-<shortsha>) published by the
        # resolvetrace-core publish-image workflow. Floating `:latest`
        # would let an upstream push silently change CI behaviour. Bump
        # by updating the tag deliberately when the new core revision is
        # known-compatible.
        #
        # Explicit retry coverage on the GHCR pull: services-style pulls
        # have no in-band retry hook, and a single transient 5xx kills
        # the job before step 1. 5 attempts × 10s backoff = 50s ceiling
        # plus per-attempt timeout, well inside the job's 20-minute cap.
        run: |
          IMAGE="ghcr.io/peaktek/resolvetrace-core:sha-dbab336"
          for i in 1 2 3 4 5; do
            if docker pull "$IMAGE"; then
              echo "pulled on attempt $i"
              exit 0
            fi
            echo "pull attempt $i failed; sleeping 10s"
            sleep 10
          done
          echo "::error::failed to pull $IMAGE after 5 attempts"
          exit 1

      - name: Start ingest container on the shared network
        run: |
          docker run -d \
            --name ingest \
            --network rt-conformance \
            --network-alias ingest \
            -p 4317:4317 \
            -e OSS_API_KEY=rt_ci_conformance_key \
            -e DATABASE_URL='postgres://conformance:conformance@postgres:5432/conformance' \
            -e REDIS_URL='redis://localhost:6379/0' \
            -e S3_BUCKET='conformance-stub' \
            -e S3_ENDPOINT='http://minio:9000' \
            -e AWS_REGION='us-east-1' \
            -e AWS_ACCESS_KEY_ID='conformance' \
            -e AWS_SECRET_ACCESS_KEY='conformance' \
            -e RESOLVETRACE_TENANT_ID='oss-single-tenant' \
            -e RESOLVETRACE_ENV='dev' \
            ghcr.io/peaktek/resolvetrace-core:sha-dbab336

      - name: Wait for ingest readiness
        # Polls the ingest /health endpoint via the host port mapping.
        # Replaces the implicit GitHub-services healthcheck wait. The
        # image's baked-in HEALTHCHECK still runs inside the container,
        # but we don't depend on Docker reporting "healthy" to gate the
        # next step.
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4317/health; then
              echo "ingest is ready."
              exit 0
            fi
            sleep 2
          done
          echo "::error::ingest did not become ready within 60s."
          docker logs ingest || true
          exit 1

      - name: Start MinIO on the shared network
        run: |
          # MinIO image pinned to a specific release tag for supply-chain
          # hygiene — floating `:latest` would let an upstream push silently
          # change CI behaviour. Bump by updating the tag deliberately.
          docker run -d \
            --name minio \
            --network rt-conformance \
            --network-alias minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=conformance \
            -e MINIO_ROOT_PASSWORD=conformance \
            minio/minio:RELEASE.2025-09-07T16-13-09Z \
            server /data

      - name: Wait for MinIO readiness
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live; then
              echo "MinIO is live."
              exit 0
            fi
            sleep 2
          done
          echo "::error::MinIO did not become ready within 60s."
          docker logs minio || true
          exit 1

      - name: Map minio hostname to localhost for runner-side fetches
        run: |
          # Presigned URLs the ingest server mints point at `http://minio:9000`
          # (the hostname it sees over the shared docker network). AWS SigV4
          # pins the Host header into the signature, so the harness's PUT
          # must use the same hostname. Point `minio` at localhost on the
          # runner so fetch() resolves it and reaches MinIO over the mapped
          # host port — the Host header stays as "minio:9000" and the
          # signature validates.
          echo "127.0.0.1 minio" | sudo tee -a /etc/hosts

      - name: Seed canonical replay chunk into MinIO
        env:
          # The AWS CLI on the runner talks to MinIO with the same keys as
          # the ingest server; only the endpoint differs (runner reaches
          # MinIO via the mapped localhost port, ingest reaches it over the
          # shared network at http://minio:9000).
          AWS_ACCESS_KEY_ID: conformance
          AWS_SECRET_ACCESS_KEY: conformance
          AWS_REGION: us-east-1
        run: |
          aws s3 mb s3://conformance-stub --endpoint-url http://localhost:9000
          # The `ReplayManifestRequest/valid-normal` fixture declares
          # `bytes: 523104` for the canonical chunk at
          # `oss-single-tenant/01HWZX9CVJT5S0Y1Z2N3M4K5MP/0.rrweb`. The
          # server's `/v1/replay/complete` handler rejects with HTTP 409
          # unless headObject(key).size === body.bytes; it does not verify
          # sha256 when the backend omits ChecksumSHA256 (MinIO's default
          # PUT path), so zero-filled content is sufficient.
          head -c 523104 /dev/zero > /tmp/chunk
          test "$(wc -c < /tmp/chunk)" = "523104"
          aws s3 cp /tmp/chunk \
            's3://conformance-stub/oss-single-tenant/01HWZX9CVJT5S0Y1Z2N3M4K5MP/0.rrweb' \
            --endpoint-url http://localhost:9000

      - name: Setup Node 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install root TypeScript deps
        run: npm install --no-audit --no-fund

      - name: Install SDK TypeScript deps
        working-directory: sdk/typescript
        run: npm install --no-audit --no-fund

      - name: Build TypeScript SDK
        working-directory: sdk/typescript
        run: npm run build

      - name: Install Python SDK (editable)
        working-directory: sdk/python
        run: python -m pip install -e .

      - name: Install conformance harness deps
        working-directory: conformance
        run: npm install --no-audit --no-fund

      - name: Run conformance harness against local ingest service
        working-directory: conformance
        env:
          CONFORMANCE_ENDPOINT: http://localhost:4317
          CONFORMANCE_API_KEY: rt_ci_conformance_key
          CONFORMANCE_FORMAT: tap
        run: npx tsx src/index.ts

      - name: Stop ingest container
        if: always()
        run: docker rm -f ingest 2>/dev/null || true

      - name: Stop MinIO container
        if: always()
        run: docker rm -f minio 2>/dev/null || true

      - name: Stop Postgres container
        if: always()
        run: docker rm -f postgres 2>/dev/null || true

      - name: Remove shared docker network
        if: always()
        run: docker network rm rt-conformance 2>/dev/null || true
