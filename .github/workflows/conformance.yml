# Conformance harness job.
#
# Runs the black-box suite under `conformance/` against the published OSS
# ingest server image (`ghcr.io/peaktek/resolvetrace-core:latest`, produced
# by the `resolvetrace-core` repository). The job is a first-class gate:
# any conformance regression blocks the PR.
#
# Container layout:
#   - `ingest` runs as a GitHub Actions service so the runner waits for
#     its baked-in HEALTHCHECK before executing the harness step.
#   - MinIO runs via `docker run -d` in a setup step (not as a GHA
#     service) because the official `minio/minio` image needs the
#     `server /data` command at launch — GitHub Actions `services:` has
#     no `command` field. We attach the manual container to the same
#     auto-generated docker network GitHub creates for the job's services,
#     under the network alias `minio`, so the ingest container can reach
#     it at `http://minio:9000` exactly as if it were a sibling service.
#     (bitnami/minio — the usual workaround that bakes `server /data` into
#     the entrypoint — was moved to a restricted Broadcom registry in
#     Aug 2025; see velero-io/velero#9279.)
name: conformance

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: conformance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conformance:
    name: black-box conformance
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      ingest:
        # Image is published from the resolvetrace-core repo. This service
        # block pulls the pinned tag and exposes it to the harness step
        # below on ingest:4317.
        image: ghcr.io/peaktek/resolvetrace-core:latest
        env:
          # Auth: the harness sends Bearer rt_ci_conformance_key; the OSS
          # server authorises that exact value via OSS_API_KEY.
          OSS_API_KEY: rt_ci_conformance_key
          # Required env for the single-tenant resolver + storage adapters to
          # pass their startup config checks. Values that need to reach a
          # real backend (S3) point at the `minio` container the setup step
          # starts; the rest remain stubs since the harness doesn't exercise
          # DB or Redis.
          DATABASE_URL: 'postgres://stub:stub@localhost:5432/stub'
          REDIS_URL: 'redis://localhost:6379/0'
          S3_BUCKET: 'conformance-stub'
          S3_ENDPOINT: 'http://minio:9000'
          AWS_REGION: 'us-east-1'
          # Must match the MINIO_ROOT_USER / MINIO_ROOT_PASSWORD the setup
          # step passes to MinIO, so the AWS SDK's HeadObject succeeds.
          AWS_ACCESS_KEY_ID: 'conformance'
          AWS_SECRET_ACCESS_KEY: 'conformance'
          RESOLVETRACE_TENANT_ID: 'oss-single-tenant'
          RESOLVETRACE_ENV: 'dev'
        ports:
          - 4317:4317
        # No --health-cmd override here: the Dockerfile already defines a
        # Node-based HEALTHCHECK that pokes http://127.0.0.1:$PORT/health.
        # The base image (node:20-bookworm-slim) ships without wget/curl, so
        # a wget-based --health-cmd would stall the container as "unhealthy"
        # even when the server is serving traffic. Docker uses the image's
        # baked-in HEALTHCHECK when no override is set; GitHub waits for
        # "healthy" before running the harness step.

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Start MinIO on the services network
        run: |
          # Discover the docker network GitHub created for this job's
          # services. The name is `github_network_<random>`; we find the
          # single match and join the manual MinIO container to it so the
          # ingest service can reach it by name.
          NETWORK=$(docker network ls --filter name=github_network --format '{{.Name}}' | head -n1)
          if [ -z "$NETWORK" ]; then
            echo "::error::no github_network_* network found"
            exit 1
          fi
          echo "joining network: $NETWORK"
          # MinIO image pinned to a specific release tag for supply-chain
          # hygiene — floating `:latest` would let an upstream push silently
          # change CI behaviour. Bump by updating the tag deliberately.
          docker run -d \
            --name minio \
            --network "$NETWORK" \
            --network-alias minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=conformance \
            -e MINIO_ROOT_PASSWORD=conformance \
            minio/minio:RELEASE.2025-09-07T16-13-09Z \
            server /data

      - name: Wait for MinIO readiness
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live; then
              echo "MinIO is live."
              exit 0
            fi
            sleep 2
          done
          echo "::error::MinIO did not become ready within 60s."
          docker logs minio || true
          exit 1

      - name: Map minio hostname to localhost for runner-side fetches
        run: |
          # Presigned URLs the ingest server mints point at `http://minio:9000`
          # (the hostname it sees over the services docker network). AWS SigV4
          # pins the Host header into the signature, so the harness's PUT
          # must use the same hostname. Point `minio` at localhost on the
          # runner so fetch() resolves it and reaches MinIO over the mapped
          # host port — the Host header stays as "minio:9000" and the
          # signature validates.
          echo "127.0.0.1 minio" | sudo tee -a /etc/hosts

      - name: Seed canonical replay chunk into MinIO
        env:
          # The AWS CLI on the runner talks to MinIO with the same keys as
          # the ingest server; only the endpoint differs (runner reaches
          # MinIO via the mapped localhost port, ingest reaches it over the
          # service network at http://minio:9000).
          AWS_ACCESS_KEY_ID: conformance
          AWS_SECRET_ACCESS_KEY: conformance
          AWS_REGION: us-east-1
        run: |
          aws s3 mb s3://conformance-stub --endpoint-url http://localhost:9000
          # The `ReplayManifestRequest/valid-normal` fixture declares
          # `bytes: 523104` for the canonical chunk at
          # `oss-single-tenant/01HWZX9CVJT5S0Y1Z2N3M4K5MP/0.rrweb`. The
          # server's `/v1/replay/complete` handler rejects with HTTP 409
          # unless headObject(key).size === body.bytes; it does not verify
          # sha256 when the backend omits ChecksumSHA256 (MinIO's default
          # PUT path), so zero-filled content is sufficient.
          head -c 523104 /dev/zero > /tmp/chunk
          test "$(wc -c < /tmp/chunk)" = "523104"
          aws s3 cp /tmp/chunk \
            's3://conformance-stub/oss-single-tenant/01HWZX9CVJT5S0Y1Z2N3M4K5MP/0.rrweb' \
            --endpoint-url http://localhost:9000

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install root TypeScript deps
        run: npm install --no-audit --no-fund

      - name: Install SDK TypeScript deps
        working-directory: sdk/typescript
        run: npm install --no-audit --no-fund

      - name: Build TypeScript SDK
        working-directory: sdk/typescript
        run: npm run build

      - name: Install Python SDK (editable)
        working-directory: sdk/python
        run: python -m pip install -e .

      - name: Install conformance harness deps
        working-directory: conformance
        run: npm install --no-audit --no-fund

      - name: Run conformance harness against local ingest service
        working-directory: conformance
        env:
          CONFORMANCE_ENDPOINT: http://localhost:4317
          CONFORMANCE_API_KEY: rt_ci_conformance_key
          CONFORMANCE_FORMAT: tap
        run: npx tsx src/index.ts

      - name: Stop manually-run MinIO container
        if: always()
        # The `minio` container was started by `docker run` in a step, not as
        # a GHA `services:` entry, so GitHub's auto-cleanup doesn't know to
        # remove it — which leaves the services network with an active
        # endpoint and surfaces a "network rm failed" warning at job end.
        # Remove it explicitly so teardown is clean.
        run: docker rm -f minio 2>/dev/null || true
