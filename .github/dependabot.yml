# Dependabot config for the ResolveTrace contract repo.
#
# Covers the npm toolchain (TypeBox, ajv, datamodel-code-generator's JS
# peers, etc.) and the GitHub Actions pinned in .github/workflows/.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
